<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">                                                                                                                                                                                                                                                                                                      
    <title>reclamação</title>
    <style>
        body {
            background-color: #D0E8D0; 
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #0B1D12;
            
            
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
            box-sizing: border-box;
        }

        .form-container {
            width: 100%;
            max-width: 320px; 
        }

        
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: left; 
            font-size: 26px;
        }

        label {
            font-size: 15px;
            font-weight: bold;
        }

        
        input[type="text"],
        input[type="file"] {
            width: 100%;
            box-sizing: border-box; 
            border: 2px solid #1E4620;
            border-radius: 10px; 
            padding: 12px;       
            font-size: 16px; 
            color: #1E4620;
            background-color: #FFFFFF;
            outline: none;
            margin-top: 5px;     
        }

        
        input[type="file"]::file-selector-button {
            background-color: #1E4620;
            color: #D0E8D0;
            border: none;
            border-radius: 5px;
            padding: 6px 12px;
            margin-right: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"] {
            width: 100%; 
            background-color: #1E4620;
            color: #D0E8D0;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        input[type="submit"]:hover {
            background-color: #0B1D12;
        }

        .botoes-group {
            margin-top: 15px;
        }

        .btn-voltar {
            width: 100%;
            background-color: transparent;
            color: #1E4620;
            border: 2px solid #1E4620;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-voltar:hover {
            background-color: rgba(30, 70, 32, 0.1);
        }

        input::placeholder {
            color: rgba(30, 70, 32, 0.4);
        }

        .footer {
            margin-top: 25px;
            text-align: left; 
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>processo de reclamação</h1>
        
        <form action="cauatauavictor3.html" method="GET" enctype="multipart/form-data">
            <label for="fname"><h2>municipio:</h2></label><br>
            <input type="text" id="fname" name="fname" placeholder="......"><br><br>

            <label for="lname"><h2>bairro:</h2></label><br>
            <input type="text" id="lname" name="lname" placeholder="......"><br><br>

            <label for="cpf"><h2>rua:</h2></label><br>
            <input type="text" id="cpf" name="cpf" placeholder="......"><br><br>
            
            <label for="arquivo"><h2>tire uma foto e anexe aqui de sua reclamação:</h2></label><br>
            <input type="file" id="arquivo" name="arquivo"><br><br>
            
            <input type="submit" value="Submit"><br>
        </form>
        
        <div class="botoes-group">
            <button class="btn-voltar" onclick="window.location.href='index.html'">Voltar</button>
        </div>
        
        <div class="footer">
            <h4>ifmt bg .</h4>
        </div>
    </div>

</body>
</html>
